[build]
  command   = "npm install && npm run build:client"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect all /api/* calls to Netlify Functions
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — send all other routes to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
